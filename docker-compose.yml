version: '3.8'

services:
  quantify-ai:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: quantify_ai_service
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - JWT_SECRET=quantify_docker_compose_super_secure_signing_key_9988_xyz
      - APP_URL=http://localhost:3000
    volumes:
      # Map the JSON ledger storage file to a persistent host mount to survive container recycles
      - quantify_data:/app/data.json
    restart: always

volumes:
  quantify_data:
    driver: local
